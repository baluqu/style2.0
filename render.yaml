services:
  - type: web
    name: stylebridge
    runtime: python
    plan: free
    region: oregon
    autoDeployTrigger: commit
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn "app:create_app()" --bind 0.0.0.0:$PORT --workers 2 --threads 2 --timeout 120
    healthCheckPath: /health
    envVars:
      - key: FLASK_ENV
        value: production
      - key: LOG_LEVEL
        value: INFO
      - key: SECRET_KEY
        generateValue: true
      - key: ADMIN_KEY
        generateValue: true
      - key: FORCE_HTTPS
        value: "true"
      - key: TRUST_PROXY_HEADERS
        value: "true"
      - key: SESSION_COOKIE_SECURE
        value: "true"
      - key: REMEMBER_COOKIE_SECURE
        value: "true"
      - key: DATABASE_SSL_MODE
        value: require
      - key: SUPABASE_USE_STORAGE
        value: "false"
