{% extends "base.html" %}
{% block title %}{{ title }} | StyleBridge{% endblock %}
{% block content %}
  <section class="mx-auto max-w-2xl rounded-[2rem] border border-white/10 bg-slate-900/85 p-6 text-center md:p-8">
    <div class="text-xs font-black uppercase tracking-[0.18em] text-rose-200">{{ title }}</div>
    <h1 class="mt-3 text-3xl font-black text-white md:text-4xl">{{ message }}</h1>
    <div class="mt-6 flex flex-wrap justify-center gap-3">
      <a href="{{ url_for('main.demo') }}" class="rounded-full bg-cyan-300 px-5 py-3 text-sm font-black text-slate-950 transition hover:bg-cyan-200">Open demo</a>
      <a href="{{ url_for('main.home') }}" class="rounded-full border border-white/15 px-5 py-3 text-sm font-black text-white transition hover:bg-white/10">Go home</a>
    </div>
  </section>
{% endblock %}
